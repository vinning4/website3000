<header id="cs-navigation">
    <div class="cs-container">
        <a href="/" class="cs-logo" aria-label="back to home">
            <img src="/assets/svgs/logo5.png" alt="Website3000" width="200" height="42" decoding="async">
        </a>
        <nav class="cs-nav" role="navigation">
            <button class="cs-toggle" aria-label="mobile menu toggle">
                <div class="cs-box" aria-hidden="true">
                    <span class="cs-line cs-line1" aria-hidden="true"></span>
                    <span class="cs-line cs-line2" aria-hidden="true"></span>
                    <span class="cs-line cs-line3" aria-hidden="true"></span>
                </div>
            </button>
            <div class="cs-ul-wrapper">
                <ul id="cs-expanded" class="cs-ul" aria-expanded="false">
                    <li class="cs-li">
                        <a href="/why-it-works/" class="cs-li-link">Why It Works</a>
                    </li>
                    <li class="cs-li">
                        <a href="/pricing/" class="cs-li-link">Pricing</a>
                    </li>
                    <!--
                    <li class="cs-li">
                        <a href="/portfolio/" class="cs-li-link">Portfolio</a>
                    </li>
                    -->
                    <li class="cs-li">
                        <a href="/about/" class="cs-li-link">About</a>
                    </li>
                    <li class="cs-li cs-mobile-only">
                        <a href="/contact/" class="cs-li-link">Contact</a>
                    </li>
                </ul>
            </div>
        </nav>
        <a href="/contact/" class="cs-button-solid cs-nav-cta" aria-label="contact us">
            <span>Contact</span><span class="cs-cursor">_</span>
        </a>
    </div>
</header>


<script>
    var CSbody = document.querySelector("body");
    const CSnavbarMenu = document.querySelector("#cs-navigation .cs-nav");
    const CShamburgerMenu = document.querySelector("#cs-navigation .cs-toggle");

    CShamburgerMenu.addEventListener('click', function() {
        CShamburgerMenu.classList.toggle("cs-active");
        CSnavbarMenu.classList.toggle("cs-active");
        CSbody.classList.toggle("cs-open");
        ariaExpanded();
    });

    // close nav when clicking outside
    document.addEventListener('click', function(e) {
        const nav = document.querySelector('#cs-navigation');
        const isClickInside = nav.contains(e.target);

        if (!isClickInside && CSnavbarMenu.classList.contains('cs-active')) {
            CShamburgerMenu.classList.remove('cs-active');
            CSnavbarMenu.classList.remove('cs-active');
            CSbody.classList.remove('cs-open');
            ariaExpanded();
        }
    });

    function ariaExpanded() {
        const csUL = document.querySelector('#cs-expanded');
        const csExpanded = csUL.getAttribute('aria-expanded');
        if (csExpanded === 'false') {
            csUL.setAttribute('aria-expanded', 'true');
        } else {
            csUL.setAttribute('aria-expanded', 'false');
        }
    }

    document.addEventListener('scroll', (e) => {
        const scroll = document.documentElement.scrollTop;
        if (scroll >= 100) {
            document.querySelector('body').classList.add('scroll');
        } else {
            document.querySelector('body').classList.remove('scroll');
        }
    });

    const dropDowns = Array.from(document.querySelectorAll('#cs-navigation .cs-dropdown'));
    for (const item of dropDowns) {
        const onClick = () => { item.classList.toggle('cs-active') }
        item.addEventListener('click', onClick)
    }

    document.addEventListener('DOMContentLoaded', function() {
        const navLinks = document.querySelectorAll('.cs-li-link');
        const currentPath = window.location.pathname;

        navLinks.forEach(link => link.classList.remove('cs-active'));

        navLinks.forEach(link => {
            const href = link.getAttribute('href');
            if (
                (currentPath === '/' && href === '/') ||
                (currentPath.includes('/why-it-works/') && href === '/why-it-works/') ||
                (currentPath.includes('/pricing/') && href === '/pricing/') ||
                (currentPath.includes('/portfolio/') && href === '/portfolio/') ||
                (currentPath.includes('/about/') && href === '/about/')
            ) {
                link.classList.add('cs-active');
            }
        });
    });
</script>
